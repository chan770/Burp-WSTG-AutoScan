plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    // Montoya API is provided by Burp at runtime — compile against it only.
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2026.4'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

sourceSets {
    main {
        java { srcDirs = ['src'] }
    }
}

tasks.named('jar') {
    archiveBaseName = 'autoscan'
    archiveVersion = ''
    destinationDirectory = file("$projectDir/dist")
}
